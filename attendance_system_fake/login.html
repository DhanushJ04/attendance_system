<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to top left, #0f2027, #203a43, #2c5364);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .wave {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 200px;
      background: url('https://svgshare.com/i/uZ7.svg') repeat-x;
      background-size: contain;
      animation: wave 10s linear infinite;
      z-index: 0;
      opacity: 0.8;
    }

    @keyframes wave {
      from { background-position-x: 0; }
      to { background-position-x: 1000px; }
    }

    .login-box {
      z-index: 1;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(15px);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.2), 0 0 60px rgba(0, 255, 255, 0.1);
      text-align: center;
      animation: fadeIn 1.2s ease;
      width: 380px;
      border: 1px solid rgba(0, 255, 255, 0.2);
    }

    h2 {
      color: #00ffff;
      margin-bottom: 25px;
      font-weight: 700;
      font-size: 28px;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      animation: glowText 2s infinite alternate;
    }

    @keyframes glowText {
      from { text-shadow: 0 0 10px #00ffff; }
      to   { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #ffffff;
      font-weight: 500;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #00ffff;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      outline: none;
      box-shadow: 0 0 5px #00ffff;
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: #00ffff;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff;
      transition: all 0.3s ease;
    }

    input[type="submit"]:hover {
      background: #00e6e6;
      box-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Welcome, Teacher 👨‍🏫</h2>
    <form action="login.php" method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter password" required>
      </div>
      <input type="submit" value="Login">
    </form>
  </div>

  <div class="wave"></div>

</body>
</html>
